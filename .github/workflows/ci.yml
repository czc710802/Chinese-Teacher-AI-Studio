name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Type Check, Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: CI configuration check
        run: npm run ci:check

      - name: Install root dependencies
        run: npm install

      - name: Install app dependencies
        run: npm run install:all

      - name: Install CI tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Type Check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: |
          node --test server/test/benchmark-center.test.js
          find server/test -name '*.test.js' ! -name 'benchmark-center.test.js' ! -name 'production-data.test.js' -print0 | xargs -0 node --test

      - name: Benchmark Test
        run: npm run benchmark:test

      - name: PASS
        run: echo "PASS"
