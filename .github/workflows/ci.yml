name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm install
      - name: Install workspaces
        run: npm run install:all
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
      - name: Package build artifact
        run: tar -czf client-dist.tar.gz -C client/dist .
      - uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client-dist.tar.gz
